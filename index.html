<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="أقساط" />
  <title>أقساط — إدارة الالتزامات المالية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="icon-192.png" alt="أقساط" class="brand-logo" />
      <div>
        <h1>أقساط</h1>
        <div class="fx-line" id="fxLine" title="تحديث سعر الصرف">
          <span>$1 = <b id="fxUsd">50</b> ج.م</span>
          <span class="sep">·</span>
          <span>﷼1 = <b id="fxSar">13.3</b> ج.م</span>
          <span class="spin-ic">⟳</span>
        </div>
      </div>
    </div>
    <div class="header-tools">
      <button class="hbtn" id="darkBtn" title="الوضع الداكن" aria-label="تبديل الوضع الداكن">🌙</button>
      <button class="hbtn" id="bellBtn" title="التنبيهات" aria-label="التنبيهات">
        🔔<span class="bell-count hidden" id="bellCount">0</span>
      </button>
    </div>
    <input type="hidden" id="rateInput" />
  </header>

  <div class="sync-bar" id="syncBar">
    <span id="syncStatus">…</span>
    <button class="link-btn" id="accountBtn">الحساب والمزامنة</button>
  </div>

  <main class="container">
    <div class="greeting" id="greeting"></div>
    <section class="summary" id="summary" aria-label="ملخص عام"></section>

    <section class="view" id="view-dashboard"></section>

    <section class="view hidden" id="view-units">
      <div class="view-head">
        <h2>الوحدات العقارية</h2>
        <button class="btn primary" id="addUnitBtn">+ إضافة وحدة</button>
      </div>
      <div id="unitsList" class="units-list"></div>
    </section>

    <section class="view hidden" id="view-upcoming">
      <div class="view-head">
        <h2>الأقساط القادمة والمستحقة</h2>
        <select id="upcomingRange" class="select">
          <option value="30">خلال ٣٠ يوماً</option>
          <option value="90" selected>خلال ٩٠ يوماً</option>
          <option value="180">خلال ١٨٠ يوماً</option>
          <option value="365">خلال سنة</option>
          <option value="0">كل الأقساط غير المدفوعة</option>
        </select>
      </div>
      <div id="upcomingList" class="upcoming-list"></div>
    </section>

    <section class="view hidden" id="view-settle"></section>

    <section class="view hidden" id="view-reports"></section>
  </main>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-view="dashboard" role="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>الرئيسية</span>
    </button>
    <button class="tab" data-view="units" role="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="8" height="13" rx="1"/><rect x="13" y="3" width="8" height="18" rx="1"/><path d="M6 12h2M6 15h2M16 7h2M16 11h2"/></svg>
      <span>الوحدات</span>
    </button>
    <button class="tab" data-view="upcoming" role="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      <span>الأقساط</span>
    </button>
    <button class="tab" data-view="settle" role="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20M6 15h4"/></svg>
      <span>السداد</span>
    </button>
    <button class="tab" data-view="reports" role="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      <span>التقارير</span>
    </button>
  </nav>

  <!-- نافذة الوحدة -->
  <div class="modal-overlay hidden" id="unitModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="unitModalTitle">إضافة وحدة</h3>
        <button class="icon-btn" id="closeUnitModal" aria-label="إغلاق">✕</button>
      </div>
      <form id="unitForm" class="form">
        <label>اسم الوحدة *
          <input type="text" name="name" required placeholder="مثال: شقة الرحاب — عمارة ٥" />
        </label>
        <label>المشروع / المطوّر
          <input type="text" name="project" placeholder="مثال: مدينة نصر للإسكان" />
        </label>
        <div class="row">
          <label>إجمالي السعر (ج.م)
            <input type="number" name="totalPrice" min="0" step="0.01" inputmode="decimal" placeholder="0" />
          </label>
          <label>المقدم المدفوع (ج.م)
            <input type="number" name="downPayment" min="0" step="0.01" inputmode="decimal" placeholder="0" />
          </label>
        </div>
        <label>ملاحظات
          <textarea name="notes" rows="2" placeholder="رقم العقد، تفاصيل التواصل..."></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="cancelUnitBtn">إلغاء</button>
          <button type="submit" class="btn primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- نافذة القسط -->
  <div class="modal-overlay hidden" id="installmentModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="instModalTitle">إضافة قسط</h3>
        <button class="icon-btn" id="closeInstModal" aria-label="إغلاق">✕</button>
      </div>
      <div class="seg" id="instMode">
        <button type="button" class="seg-btn active" data-mode="single">قسط واحد</button>
        <button type="button" class="seg-btn" data-mode="schedule">جدول أقساط</button>
      </div>
      <form id="singleForm" class="form">
        <div class="row">
          <label>المبلغ (ج.م) *
            <input type="number" name="amount" required min="0" step="0.01" inputmode="decimal" />
          </label>
          <label>تاريخ الاستحقاق *
            <input type="date" name="dueDate" required />
          </label>
        </div>
        <label>وصف (اختياري)
          <input type="text" name="label" placeholder="مثال: قسط ربع سنوي" />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn ghost cancel-inst">إلغاء</button>
          <button type="submit" class="btn primary">حفظ</button>
        </div>
      </form>
      <form id="scheduleForm" class="form hidden">
        <div class="row">
          <label>قيمة القسط (ج.م) *
            <input type="number" name="amount" required min="0" step="0.01" inputmode="decimal" />
          </label>
          <label>عدد الأقساط *
            <input type="number" name="count" required min="1" step="1" value="12" />
          </label>
        </div>
        <div class="row">
          <label>تاريخ أول قسط *
            <input type="date" name="startDate" required />
          </label>
          <label>التكرار
            <select name="frequency" class="select">
              <option value="1">شهري</option>
              <option value="3">ربع سنوي</option>
              <option value="6">نصف سنوي</option>
              <option value="12">سنوي</option>
            </select>
          </label>
        </div>
        <p class="hint" id="scheduleHint"></p>
        <div class="modal-actions">
          <button type="button" class="btn ghost cancel-inst">إلغاء</button>
          <button type="submit" class="btn primary">إنشاء الجدول</button>
        </div>
      </form>
    </div>
  </div>

  <!-- نافذة تأجيل القسط -->
  <div class="modal-overlay hidden" id="postponeModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3>تأجيل القسط</h3>
        <button class="icon-btn" id="closePostponeModal" aria-label="إغلاق">✕</button>
      </div>
      <form id="postponeForm" class="form">
        <p class="hint" id="postponeInfo"></p>
        <label>تاريخ الاستحقاق الجديد *
          <input type="date" name="newDate" required />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="cancelPostpone">إلغاء</button>
          <button type="submit" class="btn primary">حفظ التأجيل</button>
        </div>
      </form>
    </div>
  </div>

  <!-- نافذة الحساب والمزامنة -->
  <div class="modal-overlay hidden" id="accountModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3>الحساب والمزامنة</h3>
        <button class="icon-btn" id="closeAccountModal" aria-label="إغلاق">✕</button>
      </div>
      <div class="form">
        <p class="hint" id="accountUserLine">مسجّل الدخول.</p>
        <button type="button" class="btn ghost" id="logoutBtn">تسجيل الخروج</button>
        <hr class="sep" />
        <label class="switch-row">
          <span>تحديث سعر الصرف تلقائياً من الإنترنت</span>
          <input type="checkbox" id="autoRateToggle" />
        </label>
        <label class="switch-row">
          <span>تنبيهات المتصفح للأقساط المستحقة</span>
          <input type="checkbox" id="notifToggle" />
        </label>
        <hr class="sep" />
        <div class="modal-actions" style="justify-content:flex-start;gap:8px;flex-wrap:wrap">
          <button type="button" class="btn ghost small" id="exportBtn2">تصدير نسخة احتياطية</button>
          <button type="button" class="btn ghost small" id="importBtn2">استيراد</button>
          <input type="file" id="importFile" accept="application/json" hidden />
        </div>
      </div>
    </div>
  </div>

  <!-- لوحة التنبيهات -->
  <div class="notif-panel hidden" id="notifPanel"></div>

  <!-- منطقة الطباعة (تُملأ عند الطباعة) -->
  <div id="printArea"></div>

  <!-- شاشة تسجيل الدخول -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-head">
      <img src="icon-192.png" alt="أقساط" class="login-logo" />
      <div>
        <div class="login-title">أقساط</div>
        <div class="login-slogan">إدارة التزاماتك المالية بثقة</div>
      </div>
    </div>
    <div class="login-card">
      <form id="loginForm" class="form" style="padding:0">
        <label>البريد الإلكتروني
          <input type="email" id="loginEmail" autocomplete="username" required placeholder="you@example.com" />
        </label>
        <label>كلمة المرور
          <input type="password" id="loginPassword" autocomplete="current-password" required placeholder="••••••••" />
        </label>
        <button type="submit" class="btn primary" id="loginBtn" style="width:100%;margin-top:6px">تسجيل الدخول</button>
      </form>
      <div id="loginMsg" class="msg hidden" style="margin-top:12px"></div>
    </div>
    <p class="login-note">استخدم نفس بريد وكلمة مرور حسابك.</p>
  </div>

  <!-- Firebase (للمصادقة فقط — الإعدادات عامة) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
