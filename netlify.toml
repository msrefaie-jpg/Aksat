[build]
  publish = "."
  functions = "netlify/functions"
  command = ""

[build.environment]
  NODE_VERSION = "20"

# توجيه مسارات /api/* إلى دوال Netlify
[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/rate"
  to = "/.netlify/functions/rate"
  status = 200

[[redirects]]
  from = "/api/inspect"
  to = "/.netlify/functions/inspect"
  status = 200
