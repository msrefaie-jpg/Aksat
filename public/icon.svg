<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0b5850"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d7f2ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- برجان يمثّلان العقارات -->
  <g>
    <rect x="150" y="150" width="96" height="232" rx="12" fill="url(#tower)"/>
    <rect x="262" y="196" width="96" height="186" rx="12" fill="url(#tower)" opacity="0.92"/>
    <!-- نوافذ البرج الأول -->
    <g fill="#0f766e">
      <rect x="168" y="176" width="24" height="24" rx="4"/>
      <rect x="204" y="176" width="24" height="24" rx="4"/>
      <rect x="168" y="216" width="24" height="24" rx="4"/>
      <rect x="204" y="216" width="24" height="24" rx="4"/>
      <rect x="168" y="256" width="24" height="24" rx="4"/>
      <rect x="204" y="256" width="24" height="24" rx="4"/>
    </g>
    <!-- نوافذ البرج الثاني -->
    <g fill="#0b5850" opacity="0.85">
      <rect x="280" y="222" width="22" height="22" rx="4"/>
      <rect x="316" y="222" width="22" height="22" rx="4"/>
      <rect x="280" y="260" width="22" height="22" rx="4"/>
      <rect x="316" y="260" width="22" height="22" rx="4"/>
    </g>
  </g>
  <!-- شارة عملة الريال -->
  <circle cx="330" cy="330" r="66" fill="#0f766e" stroke="#ffffff" stroke-width="8"/>
  <text x="330" y="360" text-anchor="middle" font-family="-apple-system, Segoe UI, Tahoma, sans-serif" font-size="78" font-weight="800" fill="#ffffff">﷼</text>
</svg>
